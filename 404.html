<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 — Page not found | Angel Robles</title>
    <meta name="description" content="That page could not be found.">
    <meta name="robots" content="noindex">
    <link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico">
    <link rel="stylesheet" href="/css/main.min.css">
    <script>
      (function(){
        var theme = null;
        try { theme = localStorage.getItem('theme'); } catch (e) {}
        if (theme !== 'dark' && theme !== 'light') {
          theme = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
  </head>
  <body>
    <a href="#main" class="skip">Skip to content</a>

    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="/" aria-label="Home">A. L. Robles</a>
        <nav aria-label="Primary">
          <ul class="nav-links">
            <li><a href="/projects/">Projects</a></li>
            <li><a href="/cv/cv.pdf">CV</a></li>
            <li>
              <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle color theme" aria-pressed="false" title="Toggle theme">
                <span class="moon" aria-hidden="true">&#9789;</span>
                <span class="sun" aria-hidden="true">&#9728;</span>
              </button>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <div class="container notfound">
        <h1>404</h1>
        <p>The page you were looking for doesn't exist.</p>
        <p><a href="/">Back to the homepage</a> &middot; <a href="/projects/">See projects</a></p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div>&copy; 2026 Angel L. Robles</div>
        <div><a href="https://github.com/alrobles/alrobles.github.io">Source on GitHub</a></div>
      </div>
    </footer>

    <script>
      (function(){
        var root = document.documentElement;
        var btn = document.getElementById('theme-toggle');
        if (!btn) return;
        var sync = function(){
          btn.setAttribute('aria-pressed', root.getAttribute('data-theme') === 'dark' ? 'true' : 'false');
        };
        sync();
        btn.addEventListener('click', function(){
          var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          root.setAttribute('data-theme', next);
          try { localStorage.setItem('theme', next); } catch (e) {}
          sync();
        });
      })();
    </script>
  </body>
</html>
